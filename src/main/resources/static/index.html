<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BackendForge</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg: #0a0a0f;
          --surface: #111118;
          --border: #1e1e2e;
          --accent: #e8ff47;
          --accent2: #47ffd4;
          --text: #e8e8f0;
          --muted: #5a5a7a;
          --danger: #ff4747;
        }

        body {
          font-family: 'Syne', sans-serif;
          background: var(--bg);
          color: var(--text);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          position: relative;
        }

        /* Animated grid background */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
          background-size: 48px 48px;
          animation: gridShift 20s linear infinite;
          pointer-events: none;
        }

        @keyframes gridShift {
          0% { transform: translateY(0); }
          100% { transform: translateY(48px); }
        }

        /* Glowing orbs */
        .orb {
          position: fixed;
          border-radius: 50%;
          filter: blur(80px);
          pointer-events: none;
          opacity: 0.15;
        }
        .orb-1 {
          width: 400px; height: 400px;
          background: var(--accent);
          top: -100px; left: -100px;
          animation: float1 8s ease-in-out infinite;
        }
        .orb-2 {
          width: 300px; height: 300px;
          background: var(--accent2);
          bottom: -80px; right: -80px;
          animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
          0%, 100% { transform: translate(0, 0); }
          50% { transform: translate(40px, 30px); }
        }
        @keyframes float2 {
          0%, 100% { transform: translate(0, 0); }
          50% { transform: translate(-30px, -40px); }
        }

        /* Main container */
        .container {
          position: relative;
          z-index: 10;
          width: 100%;
          max-width: 460px;
          padding: 0 24px;
        }

        /* Header */
        .brand {
          margin-bottom: 48px;
          animation: fadeUp 0.6s ease both;
        }

        .brand-tag {
          font-family: 'JetBrains Mono', monospace;
          font-size: 11px;
          color: var(--accent);
          letter-spacing: 3px;
          text-transform: uppercase;
          margin-bottom: 12px;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .brand-tag::before {
          content: '';
          display: inline-block;
          width: 20px;
          height: 1px;
          background: var(--accent);
        }

        .brand h1 {
          font-size: 48px;
          font-weight: 800;
          line-height: 1;
          letter-spacing: -2px;
        }

        .brand h1 span {
          color: var(--accent);
        }

        .brand p {
          margin-top: 12px;
          font-size: 15px;
          color: var(--muted);
          font-family: 'JetBrains Mono', monospace;
          font-weight: 400;
        }

        /* Card */
        .card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 36px;
          position: relative;
          animation: fadeUp 0.6s 0.1s ease both;
        }

        .card::before {
          content: '';
          position: absolute;
          top: 0; left: 24px; right: 24px;
          height: 1px;
          background: linear-gradient(90deg, transparent, var(--accent), transparent);
          opacity: 0.5;
        }

        /* Tabs */
        .tabs {
          display: flex;
          gap: 4px;
          background: var(--bg);
          border-radius: 10px;
          padding: 4px;
          margin-bottom: 32px;
        }

        .tab {
          flex: 1;
          padding: 10px;
          border: none;
          background: transparent;
          color: var(--muted);
          font-family: 'Syne', sans-serif;
          font-size: 14px;
          font-weight: 700;
          border-radius: 8px;
          cursor: pointer;
          transition: all 0.2s;
          letter-spacing: 0.5px;
        }

        .tab.active {
          background: var(--accent);
          color: var(--bg);
        }

        /* Form */
        .form-group {
          margin-bottom: 20px;
        }

        label {
          display: block;
          font-family: 'JetBrains Mono', monospace;
          font-size: 11px;
          color: var(--muted);
          letter-spacing: 2px;
          text-transform: uppercase;
          margin-bottom: 8px;
        }

        input {
          width: 100%;
          padding: 14px 16px;
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 10px;
          color: var(--text);
          font-family: 'JetBrains Mono', monospace;
          font-size: 14px;
          outline: none;
          transition: border-color 0.2s;
        }

        input:focus {
          border-color: var(--accent);
        }

        input::placeholder {
          color: var(--muted);
        }

        /* Buttons */
        .btn-primary {
          width: 100%;
          padding: 16px;
          background: var(--accent);
          color: var(--bg);
          border: none;
          border-radius: 10px;
          font-family: 'Syne', sans-serif;
          font-size: 15px;
          font-weight: 800;
          cursor: pointer;
          letter-spacing: 0.5px;
          transition: all 0.2s;
          margin-top: 8px;
          position: relative;
          overflow: hidden;
        }

        .btn-primary:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 24px rgba(232,255,71,0.3);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-primary:disabled {
          opacity: 0.5;
          cursor: not-allowed;
          transform: none;
        }

        /* Divider */
        .divider {
          display: flex;
          align-items: center;
          gap: 12px;
          margin: 24px 0;
          color: var(--muted);
          font-family: 'JetBrains Mono', monospace;
          font-size: 11px;
          letter-spacing: 2px;
        }

        .divider::before, .divider::after {
          content: '';
          flex: 1;
          height: 1px;
          background: var(--border);
        }

        /* OAuth buttons */
        .oauth-btns {
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .btn-oauth {
          width: 100%;
          padding: 14px 16px;
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 10px;
          color: var(--text);
          font-family: 'Syne', sans-serif;
          font-size: 14px;
          font-weight: 700;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 12px;
          transition: all 0.2s;
          text-decoration: none;
        }

        .btn-oauth:hover {
          border-color: var(--accent);
          color: var(--accent);
          transform: translateY(-1px);
        }

        .btn-oauth svg { width: 20px; height: 20px; flex-shrink: 0; }

        /* Error */
        .error-msg {
          background: rgba(255,71,71,0.1);
          border: 1px solid rgba(255,71,71,0.3);
          border-radius: 8px;
          padding: 12px 16px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 12px;
          color: var(--danger);
          margin-bottom: 20px;
          display: none;
        }

        .error-msg.show { display: block; }

        /* Dashboard */
        #dashboard {
          display: none;
          animation: fadeUp 0.5s ease both;
        }

        .dashboard-header {
          margin-bottom: 32px;
        }

        .greeting-tag {
          font-family: 'JetBrains Mono', monospace;
          font-size: 11px;
          color: var(--accent2);
          letter-spacing: 3px;
          text-transform: uppercase;
          margin-bottom: 8px;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .greeting-tag::before {
          content: '';
          display: inline-block;
          width: 20px; height: 1px;
          background: var(--accent2);
        }

        .greeting-name {
          font-size: 42px;
          font-weight: 800;
          letter-spacing: -2px;
          line-height: 1;
        }

        .greeting-name span { color: var(--accent); }

        .greeting-sub {
          margin-top: 10px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 13px;
          color: var(--muted);
        }

        /* Stats row */
        .stats {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
          margin: 28px 0;
        }

        .stat {
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 16px;
          text-align: center;
        }

        .stat-val {
          font-size: 28px;
          font-weight: 800;
          color: var(--accent);
          letter-spacing: -1px;
        }

        .stat-label {
          font-family: 'JetBrains Mono', monospace;
          font-size: 10px;
          color: var(--muted);
          letter-spacing: 1px;
          text-transform: uppercase;
          margin-top: 4px;
        }

        /* Token display */
        .token-box {
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 10px;
          padding: 14px 16px;
          margin-bottom: 20px;
        }

        .token-label {
          font-family: 'JetBrains Mono', monospace;
          font-size: 10px;
          color: var(--accent);
          letter-spacing: 2px;
          text-transform: uppercase;
          margin-bottom: 6px;
        }

        .token-val {
          font-family: 'JetBrains Mono', monospace;
          font-size: 11px;
          color: var(--muted);
          word-break: break-all;
          line-height: 1.6;
        }

        /* Logout */
        .btn-logout {
          width: 100%;
          padding: 14px;
          background: transparent;
          border: 1px solid var(--border);
          border-radius: 10px;
          color: var(--muted);
          font-family: 'Syne', sans-serif;
          font-size: 14px;
          font-weight: 700;
          cursor: pointer;
          transition: all 0.2s;
          letter-spacing: 0.5px;
        }

        .btn-logout:hover {
          border-color: var(--danger);
          color: var(--danger);
        }

        /* Loading spinner */
        .spinner {
          display: inline-block;
          width: 16px; height: 16px;
          border: 2px solid var(--bg);
          border-top-color: transparent;
          border-radius: 50%;
          animation: spin 0.6s linear infinite;
          vertical-align: middle;
          margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }

        /* Panel switching */
        #login-panel { display: block; }
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">

    <div id="auth-view">
        <div class="brand">

                        </svg>

                    </a>
                </div>
            </div>

            <!-- REGISTER PANEL -->
            <div id="register-panel" style="display:none">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" />

    <!-- DASHBOARD VIEW -->

        <div class="card">

                <div class="greeting-name">Hey, <span id="user-display-name">Developer</span></div>
                <div class="greeting-sub">// welcome back to the forge.</div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-val">0</div>
                    <div class="stat-label">Courses</div>
                </div>
                <div class="stat">
                    <div class="stat-val">0</div>
                    <div class="stat-label">Quizzes</div>
                </div>

                    <div class="stat-val">0</div>
                    <div class="stat-label">Streak</div>
                </div>
            </div>

            <div class="token-box">
                <div class="token-label">// access_token</div>

            </div>

            <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>

</div>

<script>
    let accessToken = null;

    // Check if coming back from OAuth redirect with token in URL
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (token) {
        accessToken = token;
        window.history.replaceState({}, '', '/');
        fetchUserAndShowDashboard();
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-panel').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-panel').style.display = tab === 'register' ? 'block' : 'none';
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Working...';
      } else {
        btn.disabled = false;
        btn.innerHTML = btnId === 'login-btn' ? 'Login' : 'Create Account';
      }
    }

    async function handleLogin() {
      hideError();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showError('// email and password required');

      setLoading('login-btn', true);
      try {
        const res = await fetch('http://localhost:8080/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');
        accessToken = data.accessToken;
        await fetchUserAndShowDashboard();
      } catch (e) {
        showError('// ' + e.message);
      } finally {
        setLoading('login-btn', false);
      }
    }

    async function handleRegister() {
      hideError();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!email || !password) return showError('// email and password required');

      setLoading('register-btn', true);
      try {
        const res = await fetch('http://localhost:8080/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed');
        showError('// account created. login now.');
        switchTab('login');
        document.querySelector('.tab').click();
      } catch (e) {
        showError('// ' + e.message);
      } finally {
        setLoading('register-btn', false);
      }
    }

    async function fetchUserAndShowDashboard() {
      try {
        const res = await fetch('http://localhost:8080/user/me', {
          headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        const data = await res.json();
        // Try to get name or email
        const displayName = data.name || data.email?.split('@')[0] || 'Developer';
        document.getElementById('user-display-name').textContent = displayName;
        document.getElementById('token-display').textContent = accessToken.substring(0, 80) + '...';
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } catch (e) {
        // Even if /user/me fails, show dashboard with token
        document.getElementById('user-display-name').textContent = 'Developer';
        document.getElementById('token-display').textContent = accessToken.substring(0, 80) + '...';
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      }
    }

    async function handleLogout() {
      try {
        await fetch('http://localhost:8080/auth/logout', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + accessToken },
          credentials: 'include'
        });
      } catch (e) {}
      accessToken = null;
      document.getElementById('auth-view').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }
</script>
</body>
</html>
